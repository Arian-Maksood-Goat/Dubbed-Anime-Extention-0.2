plugins {
    id 'com.android.application'
    id 'eu.kanade.tachiyomi.animeextension'
}

ext {
    name = 'AnimeSalt'
    pkgName = 'animesalt'
    lang = 'hi'
    versionCode = 1
    versionName = '1.0'
    baseUrl = 'https://animesalt.ac'
    isNsfw = false
}

android {
    namespace "eu.kanade.tachiyomi.animeextension.hi.animesalt"
    compileSdk 34
}